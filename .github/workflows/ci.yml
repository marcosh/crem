name: Continuous integration
on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch: # allows manual triggering
env:
  # Bump this number to invalidate the GH actions cache
  cache-version: 0

jobs:
  build:
    strategy:
      matrix:
        ghc: ['9.0.2', '9.2.8', '9.4.8', '9.6.7', '9.8.4', '9.10.3']
        cabal: ['3.10.2.0', '3.12.1.0', '3.14.2.0', '3.16.1.0']
        os: ['ubuntu-latest'] #, 'macos-latest']
    runs-on: ${{ matrix.os }}
    name: platform ${{ matrix.os }} GHC ${{ matrix.ghc }} cabal ${{ matrix.cabal }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        id: setup-haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}

      - name: Cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: ${{ runner.os }}-${{ matrix.ghc }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.ghc }}-

      - name: Build dependencies
        run: cabal build --only-dependencies

      - name: Build
        run: cabal build -f errors

      - name: Unlit
        run: |
          cabal install unlit
          unlit -i examples/Crem/Example/TwoSwitchesGate.lhs -o examples/Crem/Example/TwoSwitchesGate.hs
          rm examples/Crem/Example/TwoSwitchesGate.lhs

      - name: Test on current dependencies
        run: cabal test

      - name: Test on most recent dependencies
        run: cabal test --index-state HEAD

      - name: Test on oldest dependencies
        if: matrix.cabal == '3.10.1.0'
        run: cabal test --prefer-oldest

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Check code formatting
        uses: haskell-actions/run-fourmolu@v12
        with:
          version: "0.19.0.1"
